version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: lawbot_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: lawbot_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  valkey:
    image: valkey/valkey:7
    container_name: lawbot_valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    restart: unless-stopped

volumes:
  qdrant_data:
  mongo_data:
  valkey_data:
